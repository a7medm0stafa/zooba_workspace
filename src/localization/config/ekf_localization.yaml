# =====================================================================
# EKF Localization v3.0 — Default Parameters
# =====================================================================
# FILE:    localization/config/ekf_localization.yaml
# STATUS:  5-state EKF with online gyro bias estimation
# CREATED: 2026-05-17
#
# TUNING GUIDELINES:
#   sigma_velocity:       ↑ = faster adaptation, noisier position
#                         ↓ = smoother position, slower adaptation
#   sigma_yaw_rate:       ↑ = heading tracks gyro less rigidly
#                         ↓ = heading trusts gyro more
#   sigma_bias:           ↑ = bias adapts faster (good for variable vibrations)
#                         ↓ = bias changes slowly (stable but slow convergence)
#   sigma_encoder:        ↑ = distrust encoder velocity
#                         ↓ = trust encoder velocity
#   sigma_ackermann:      ↑ = trust gyro more for heading rate
#                         ↓ = trust Ackermann model more (faster bias learning)
#   sigma_zupt:           keep very small — stationary is high confidence
# =====================================================================

ekf_localization_node:
  ros__parameters:
    # Mode: "hardware" (encoder + IMU) or "simulation" (Gazebo joint_states)
    source: "hardware"

    # Vehicle geometry
    wheelbase: 0.265         # Distance between front and rear axles [m]
    wheel_radius: 0.033      # Wheel radius [m]
    encoder_cpr: 5471        # Encoder counts per output-shaft revolution
    gear_ratio: 124.333      # Total gear ratio (motor shaft → output shaft)

    # Topics (hardware mode)
    feedback_topic: /vehicle/feedback
    imu_topic: /vehicle/imu
    state_topic: /vehicle/state
    publish_rate: 50.0       # Hz (EKF prediction + publish rate)

    # Process noise (continuous-time standard deviations)
    # These feed into Q = G · diag(σ_v², σ_ω², σ_b²) · Gᵀ
    sigma_velocity: 0.1      # m/s — velocity prediction noise
    sigma_yaw_rate: 0.02     # rad/s — gyro rate noise
    sigma_bias: 0.005        # rad/s² — gyro bias drift rate
                              # Controls how fast the bias estimate can change.
                              # 0.005 = moderate adaptation (~2-5s convergence)
                              # 0.01  = faster adaptation, noisier bias
                              # 0.001 = very slow adaptation, very stable

    # Measurement noise (standard deviations)
    sigma_encoder: 0.05      # m/s — encoder velocity measurement noise
    sigma_imu_heading: 0.20  # rad (~11.5°) — IMU heading noise (if enabled)

    # Zero-Velocity Update (ZUPT) — prevents drift when stationary
    zupt_velocity_threshold: 0.02  # Speed below which ZUPT activates [m/s]
    sigma_zupt: 0.001        # m/s — ZUPT virtual measurement noise

    # IMU configuration
    imu_settle_time: 5.0     # Wait before trusting IMU [s]
    use_imu_heading: false   # DISABLED: Arduino yaw is pure gyro integration
    heading_update_divisor: 10  # Apply heading update every Nth timer tick

    # Ackermann heading correction — makes gyro bias observable
    # Cross-checks gyro heading against steering geometry.
    # The innovation drives both heading correction AND bias estimation.
    use_ackermann_heading: true   # ENABLED: essential for bias estimation
    sigma_ackermann_heading: 0.3  # rad — Ackermann heading measurement noise
                                  # 0.1 = too aggressive (eats real turns as "bias")
                                  # 0.2 = balanced (learns bias, detects real turns)
                                  # 0.5 = trust gyro more (slow bias learning)
    ackermann_min_velocity: 0.03  # m/s — only apply when moving

    # Initial pose (can be overridden per-launch)
    initial_x: 0.0           # Starting X position [m]
    initial_y: 0.0           # Starting Y position [m]
    initial_yaw: 0.0         # Starting heading [degrees]
