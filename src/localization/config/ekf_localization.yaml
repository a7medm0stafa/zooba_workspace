# =====================================================================
# EKF Localization — Default Parameters
# =====================================================================
# FILE: localization/config/ekf_localization.yaml
# STATUS: NEW FILE — added as part of EKF localization upgrade
# CREATED: 2026-04-24
#
# WHAT THIS FILE DOES:
#   Contains all tunable EKF parameters with default values and
#   documentation. Loaded automatically by ekf_localization.launch.py.
#   Can be overridden per-parameter from any launch file.
#
# HOW TO USE:
#   Option 1: Use the standalone launch file (loads this YAML):
#       ros2 launch localization ekf_localization.launch.py
#
#   Option 2: Override parameters in a launch file:
#       The closed_loop_hw.launch.py and closed_loop_sim.launch.py
#       already override these values as needed.
#
# TUNING GUIDELINES:
#   process_noise_*:        increase → faster adaptation, more noise in output
#                           decrease → smoother output, slower adaptation
#   encoder/gyro/imu noise: increase → DISTRUST that sensor
#                           decrease → TRUST that sensor more
#   zupt_velocity_threshold: speed below which robot is "stopped"
#   imu_yaw_noise:          set HIGH (~0.15 rad ≈ 8.5°) to use IMU heading
#                           only as a soft anchor for long-term drift correction
# =====================================================================

ekf_localization_node:
  ros__parameters:
    # Mode: "hardware" (encoder + IMU) or "simulation" (Gazebo joint_states)
    source: "hardware"

    # Vehicle geometry (must match your physical robot / Gazebo model)
    wheelbase: 0.22              # Distance between front and rear axles [m]
    wheel_radius: 0.033          # Wheel radius [m] (33 mm for hardware)
    encoder_cpr: 5471            # Encoder counts per output-shaft revolution

    # Topics (hardware mode)
    feedback_topic: /vehicle/feedback    # From: low_level_controller_node (Arduino encoder)
    imu_topic: /vehicle/imu              # From: low_level_controller_node (Arduino MPU6050)
    state_topic: /vehicle/state          # To: speed_control_node, lateral_control_node
    publish_rate: 50.0                   # Hz (EKF prediction + publish rate)

    # Process noise (Q matrix diagonal — higher = less trust in prediction model)
    process_noise_x: 0.01        # Position X prediction noise
    process_noise_y: 0.01        # Position Y prediction noise
    process_noise_yaw: 0.002     # Heading prediction noise
    process_noise_vel: 0.1       # Velocity prediction noise
    process_noise_gyro_bias: 0.00001  # Gyro bias random walk (keep small!)

    # Measurement noise (R — higher = less trust in this sensor)
    encoder_velocity_noise: 0.03   # Encoder velocity σ [m/s]
    gyro_rate_noise: 0.1          # Gyroscope angular rate σ [rad/s] (Tuned down to trust bias est)
    imu_yaw_noise: 0.1           # IMU comp.filter heading σ [rad] (Trust it more now)

    # Zero-Velocity Update (ZUPT) — prevents drift when stopped
    zupt_velocity_threshold: 0.02  # Speed below which ZUPT activates [m/s]
    zupt_noise: 0.001              # ZUPT virtual measurement noise

    # IMU initialization
    imu_settle_time: 5.0        # Wait this long before trusting IMU [s]

    # Initial pose (can be overridden per-launch)
    initial_x: 0.0              # Starting X position [m]
    initial_y: 0.0              # Starting Y position [m]
    initial_yaw: 0.0            # Starting heading [degrees]
