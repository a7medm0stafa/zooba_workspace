# Vehicle constraint parameters for the non-holonomic constraints node
# These values are based on the Gazebo Ackermann steering vehicle model

nonholonomic_constraints_node:
  ros__parameters:
    # Vehicle geometry
    wheelbase: 0.22    # Distance between front and rear axles [m]
    track_width: 0.20  # Distance between left and right wheels [m]
    wheel_radius: 0.033 # Wheel radius [m] (33 mm)

    # Velocity constraints
    # Internal gear ratio  = 44.727
    # External herringbone = 45.45mm / 16.35mm = 2.7798
    # Total ratio          = 44.727 x 2.7798 = 124.333
    # Max output shaft RPM = 200 / 2.7798 = 71.95 RPM
    # Max linear velocity  = 71.95 * 2*pi*0.033 / 60 = 0.249 m/s
    max_velocity: 0.25      # Maximum forward/reverse speed [m/s]
    max_velocity_rate: 0.5   # Maximum acceleration [m/s²]

    # Steering constraints
    max_steering_angle: 45.0 # Maximum steering angle [degrees]
    max_steering_rate: 200.0 # Maximum steering angular velocity [degrees/s]

    # Topics
    input_topic: /teleop/raw_cmd
    output_topic: /vehicle/cmd
    constraints_topic: /vehicle/constraints
    publish_rate: 20.0
