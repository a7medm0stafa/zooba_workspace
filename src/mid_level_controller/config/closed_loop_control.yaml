# Closed-loop control parameters
# Used by speed_control_node, lateral_control_node, and odometry_node

speed_control_node:
  ros__parameters:
    desired_speed: 0.5        # Goal speed [m/s]
    kp: 1.0                   # Proportional gain
    ki: 0.1                   # Integral gain
    max_velocity: 2.0         # Output saturation [m/s]
    control_rate: 20.0        # Control loop rate [Hz]
    state_topic: /vehicle/state
    output_topic: /teleop/speed_cmd

lateral_control_node:
  ros__parameters:
    desired_y: 0.0            # Target lateral position (lane) [m]
    desired_heading: 0.0      # Target heading [rad] (0 = along X-axis)
    k_stanley: 4            # Cross-track gain
    k_soft: 1.0               # Softening constant
    max_steering_angle: 35.0  # Steering saturation [degrees]
    control_rate: 20.0        # Control loop rate [Hz]
    state_topic: /vehicle/state
    output_topic: /teleop/lateral_cmd

control_merger_node:
  ros__parameters:
    speed_topic: /teleop/speed_cmd
    lateral_topic: /teleop/lateral_cmd
    output_topic: /teleop/raw_cmd
    publish_rate: 20.0

odometry_node:
  ros__parameters:
    wheelbase: 0.22           # Distance between front and rear axles [m]
    wheel_radius: 0.033       # Wheel radius [m]
    encoder_cpr: 5904         # Counts per wheel revolution (44 * 44.727 * 3)
    use_imu_heading: true     # Use IMU yaw for heading estimation
    source: "hardware"        # "hardware" or "simulation"
    feedback_topic: /vehicle/feedback
    imu_topic: /vehicle/imu
    state_topic: /vehicle/state
    publish_rate: 20.0
