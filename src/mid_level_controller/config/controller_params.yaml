# =====================================================================
# Controller Parameters — Tuning & Gains
# =====================================================================
# FILE: mid_level_controller/config/controller_params.yaml
#
# All controller tuning parameters for the Zooba vehicle.
# Organized by node with ros__parameters for direct loading.
# Contains HARDWARE tuning by default. Simulation launch files
# override specific values inline where needed.
# =====================================================================

# ==================================================================
# Speed Controller (PI)
# ==================================================================
speed_control_node:
  ros__parameters:
    desired_speed: 0.15         # Default goal speed [m/s]
    kp: 1.0                    # PI proportional gain (hardware)
    ki: 0.1                    # PI integral gain (hardware)
    max_velocity: 0.25          # Output saturation [m/s]
    control_rate: 20.0          # Control loop rate [Hz]
    state_topic: /vehicle/state
    output_topic: /teleop/speed_cmd
    bypass_pi: false            # true for hardware (Arduino PI), false for sim

# ==================================================================
# Lateral Controller (Extended Stanley)
# ==================================================================
lateral_control_node:
  ros__parameters:
    desired_x: 0.0              # Target X position [m]
    desired_y: 0.0              # Target Y position (lane) [m]
    desired_heading: 0.0        # Target heading [degrees] (0 = +X)
    k_heading: 2.0              # Heading proportional gain (↓ better heading/CTE balance)
    k_stanley: 4.0              # Cross-track gain (↑ more aggressive CTE correction)
    k_soft: 1.0                 # Softening constant (avoids div-by-zero)
    k_d_heading: 0.05           # Heading derivative damping (↓ faster response)
    max_steering_angle: 45.0    # Steering output saturation [degrees]
    steering_offset: 4.5        # Hardware calibration: servo "82" is not mechanically
                                 # straight. This constant bias [degrees] (positive = left)
                                 # compensates for the rightward drift. NOT an EKF param —
                                 # this is a physical servo/linkage misalignment correction.
                                 # To re-calibrate: drive straight at 0.2 m/s for 2m.
                                 # If car drifts right, increase. If left, decrease.
    control_rate: 20.0          # Control loop rate [Hz]
    invert_steering_output: false  # false for hardware, true for simulation
    state_topic: /vehicle/state
    output_topic: /teleop/lateral_cmd

# ==================================================================
# Control Merger
# ==================================================================
control_merger_node:
  ros__parameters:
    speed_topic: /teleop/speed_cmd
    lateral_topic: /teleop/lateral_cmd
    output_topic: /teleop/raw_cmd
    publish_rate: 20.0

# ==================================================================
# Path Planner (Cubic Spline Trajectory)
# ==================================================================
path_planner_node:
  ros__parameters:
    cruise_speed: 0.25          # [m/s] nominal straight-line speed (hardware)
    curve_speed: 0.08           # [m/s] speed in tight curves (increased for faster turns)
    lookahead_distance: 0.10    # [m] distance ahead on path for target point
    waypoint_tolerance: 0.15    # [m] cross-track snap distance
    trajectory_resolution: 0.02 # [m] dense trajectory point spacing
    goal_tolerance: 0.05        # [m] distance to final point to declare "done"
    max_lateral_accel: 0.3      # [m/s²] lateral acceleration limit for curves
    control_rate: 20.0          # [Hz] planner update rate
    start_delay: 10.0           # [s] wait before starting (let localization settle)
    state_topic: /vehicle/state

# ==================================================================
# Perception Controller (HLC — closed-loop setpoint provider)
# ==================================================================
perception_controller_node:
  ros__parameters:
    cruise_velocity: 0.25       # [m/s] speed on GREEN light
    slow_velocity: 0.15         # [m/s] speed on YELLOW/SLOW
    heading: 0.0                # [degrees] default heading (straight)
    publish_rate: 20.0          # [Hz] command publish rate
    state_topic: /traffic_light/state
    sign_topic: /sign/command
    vehicle_state_topic: /vehicle/state
    desired_speed_topic: /hlc/desired_speed
    desired_heading_topic: /hlc/desired_heading
    unknown_timeout: 2.0        # [s] no-data timeout → treat as UNKNOWN
    turn_tolerance_deg: 5.0     # [degrees] yaw error for turn completion
    sign_clear_frames: 10       # consecutive NO_SIGNAL frames to clear latch

# ==================================================================
# Odometry Node (Dead-Reckoning)
# ==================================================================
odometry_node:
  ros__parameters:
    wheelbase: 0.265             # [m]
    wheel_radius: 0.033         # [m]
    encoder_cpr: 5471           # Counts per revolution
    use_imu_heading: true       # Use IMU yaw for heading estimation
    source: "hardware"
    feedback_topic: /vehicle/feedback
    imu_topic: /vehicle/imu
    state_topic: /vehicle/state
    publish_rate: 20.0
