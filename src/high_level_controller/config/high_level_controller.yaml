# =====================================================================
# High-Level Controller — Perception Controller Config
# =====================================================================
# FILE: high_level_controller/config/high_level_controller.yaml
#
# The HLC publishes desired_speed and desired_heading to Float64 topics.
# The MLC nodes (speed_control_node, lateral_control_node) subscribe
# and run closed-loop control.
# =====================================================================

perception_controller_node:
  ros__parameters:
    cruise_velocity: 0.25       # [m/s] speed on GREEN light
    slow_velocity: 0.15         # [m/s] speed on YELLOW/SLOW
    heading: 0.0                # [degrees] default heading (straight)
    publish_rate: 20.0          # [Hz]
    state_topic: "/traffic_light/state"
    sign_topic: "/sign/command"
    vehicle_state_topic: "/vehicle/state"
    desired_speed_topic: "/hlc/desired_speed"
    desired_heading_topic: "/hlc/desired_heading"
    unknown_timeout: 2.0        # [s] timeout before treating as UNKNOWN/NO_SIGNAL
    turn_tolerance_deg: 5.0     # [degrees] how close yaw must be to target
    sign_clear_frames: 10       # consecutive NO_SIGNAL frames to clear latch
