traffic_light_detector_node:
  ros__parameters:
    # ── Circle Detection (HoughCircles) ──────────────────────────
    dp: 1.2 # Inverse accumulator resolution ratio (Higher = Much faster, less precise)
    min_dist: 10.0 # Min distance between circle centers (px)
    param1: 150.0 # Canny threshold (Increased to ignore weak texture/noise)
    param2: 30.0 # Accumulator threshold (Increased to demand more perfect circles)
    min_radius: 5 # Min circle radius (px)
    max_radius: 20 # Max circle radius (px)

    # ── ROI ──────────────────────────────────────────────────────
    roi_height_ratio: 0.8 # Fraction of image height from top

    # ── Filtering ────────────────────────────────────────────────
    min_brightness: 10 # Weak brightness floor (rejects very dark noise only)

    # ── Color Thresholds (HSV) ───────────────────────────────────
    # Red range 1 (low hue)
    red_lower1: [0, 60, 40]
    red_upper1: [10, 255, 255]

    # Red range 2 (high hue wrap-around)
    red_lower2: [160, 60, 40]
    red_upper2: [179, 255, 255]

    # Yellow
    yellow_lower: [12, 60, 40]
    yellow_upper: [40, 255, 255]

    # Green
    green_lower: [30, 50, 40]
    green_upper: [100, 255, 255]

    # ── Clustering ───────────────────────────────────────────────
    max_circle_distance: 120.0 # Max center-to-center distance to cluster (px)
    radius_tolerance: 0.75 # Max relative radius difference (ratio)
    alignment_tolerance: 1.0 # Max off-axis spread as multiple of avg radius
    min_cluster_size: 2 # Min circles needed in a cluster (rejects lone circles from sign text)

    # ── Preprocessing ────────────────────────────────────────────
    use_clahe: true # Enable CLAHE contrast enhancement (helps dim LEDs)
    clahe_clip_limit: 2.0 # CLAHE clip limit (higher = more contrast)

    # ── Colour Classification ────────────────────────────────────
    min_color_ratio: 0.1 # Min ratio of matching pixels to accept colour (0.0-1.0)

    # ── Temporal Filtering ───────────────────────────────────────
    min_confirm_frames: 5 # Consecutive frames needed to confirm a state

    # ── Tracking ─────────────────────────────────────────────────
    tracking_expansion: 1.5 # Multiplier to expand tracked bbox as search window
    tracking_lost_frames: 5 # Consecutive failed frames before reverting to DETECTION

    # ── Stream ───────────────────────────────────────────────────
    processing_rate: 20.0 # Pipeline processing rate in Hz
    show_debug_display: true # Whether to show the OpenCV debug windows locally

