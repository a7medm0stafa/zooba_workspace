# ============================================================================
# Sign Detection Node Parameters (YOLOv8 TFLite version)
# ============================================================================
# This node uses a YOLOv8 INT8 model to detect signs directly from the 
# full camera frame and publishes VehicleCmd to the mid-level controller.
# ============================================================================

perception:
  sign_detection_node:
    ros__parameters:

      # ── YOLOv8 TFLite Model ───────────────────────────────────────────────
      # Leave empty to auto-detect from perception/model/best_int8.tflite
      model_path: ""
      imgsz: 320                 # Must match the export size from Colab
      num_threads: 4             # Maximize Pi 4 ARM cores
      confidence_threshold: 0.60 # Minimum confidence to accept a bounding box
      iou_threshold: 0.45        # NMS threshold for overlapping boxes

      # ── Camera ────────────────────────────────────────────────────────────
      camera_index: 0
      frame_width: 320           # Capturing directly at YOLO resolution saves CPU
      frame_height: 240
      flip_camera: true
      publish_rate: 20.0

      # ── Display ───────────────────────────────────────────────────────────
      show_gui: false

      # ── Temporal Smoother ─────────────────────────────────────────────────
      # confirm_frames: how many consecutive frames a sign must appear
      # clear_frames:   how many consecutive NO_SIGN frames to clear
      confirm_frames: 3
      clear_frames: 6

      # ── Topics (pub/sub) ──────────────────────────────────────────────────
      cmd_output_topic: "/teleop/raw_cmd"
      sign_topic: "/perception/sign_detected"

      # ── Velocity / Heading Mappings ───────────────────────────────────────
      cruise_velocity: 0.5       # m/s — default speed when no sign detected
      slow_velocity: 0.3         # m/s — speed when SLOW_DOWN sign
      stop_velocity: 0.0         # m/s — speed when STOP sign
      turn_velocity: 0.35        # m/s — speed during turns
      turn_heading: 20.0         # degrees — steering angle for turns
      stop_duration: 3.0         # seconds — how long to stop at STOP sign